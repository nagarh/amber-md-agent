# AmberMD Agent — Python environment for the agent scripts + MCP servers.
#
# Create:   conda env create -f environment.yml
# Activate: conda activate amber_development
# Update:   conda env update -f environment.yml --prune
#
# NOTE: this is the Python toolkit only (rdkit, parmed, MDAnalysis, MCP servers, …).
# Amber/AmberTools (pmemd.cuda, sander, tleap, antechamber, cpptraj) is a SEPARATE
# install on your HPC compute nodes — load it via `module load amber/24` (see README
# Requirements + scripts/slurm_template.sh).
name: amber_development
channels:
  - conda-forge
dependencies:
  - python=3.11
  # scientific core
  - numpy
  - scipy
  - matplotlib
  # structure / cheminformatics / MD analysis
  - rdkit
  - parmed
  - mdanalysis
  - biopython
  - propka
  # PDF parsing for the Amber-manual RAG index
  - pdfminer.six
  # pip-only
  - pip
  - pip:
      - fastmcp
