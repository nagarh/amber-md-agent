<text x="160" y="614" text-anchor="middle" font-size="9" font-weight="bold" fill="#DC2626">Read mdout / log &#x2192; diagnose error</text>
<text x="160" y="627" text-anchor="middle" font-size="9" fill="#4B5563">RAG-query manual for fix</text>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- SLURM MONITOR LOOP (right side, blue dashed — outside all boxes)  -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<line x1="860"  y1="591" x2="1158" y2="591" stroke="#2563EB" stroke-width="1.8" stroke-dasharray="6,4"/>
<line x1="1158" y1="591" x2="1158" y2="183" stroke="#2563EB" stroke-width="1.8" stroke-dasharray="6,4"/>
<line x1="1158" y1="183" x2="807"  y2="183" stroke="#2563EB" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arr-blue)"/>

<text x="1172" y="410" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563EB" transform="rotate(90 1172 410)">SLURM poll &#x2192; mdinfo ETA &#x2192; check output &#x2192; proceed</text>

<!-- Monitor note — clear of boxes -->
<rect x="945" y="600" width="190" height="32" rx="6" fill="#BFDBFE" stroke="#2563EB" stroke-width="1.5"/>
<text x="1040" y="614" text-anchor="middle" font-size="9" font-weight="bold" fill="#2563EB">Background poll every 2&#x2013;5 min</text>
<text x="1040" y="627" text-anchor="middle" font-size="9" fill="#4B5563">Detect silent GPU failures</text>

