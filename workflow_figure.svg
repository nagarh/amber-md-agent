<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 870" font-family="Segoe UI, Arial, sans-serif">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
  </marker>
  <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
  </marker>
  <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
  </marker>
  <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#EA580C"/>
  </marker>
  <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#7C3AED"/>
  </marker>
  <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#D97706"/>
  </marker>
  <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#DC2626"/>
  </marker>
  <!-- Subtle shadow for boxes -->
  <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
    <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
  </filter>
</defs>

<!-- Background -->
<rect width="1200" height="870" fill="#FFFFFF" rx="0"/>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- TITLE                                                              -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<text x="600" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#0F172A">AmberMD Agent Workflow</text>
<text x="600" y="58" text-anchor="middle" font-size="12" fill="#334155">From user prompt to molecular dynamics simulations — fully autonomous on HPC</text>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- USER PROMPT                                                        -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<rect x="420" y="75" width="360" height="50" rx="10" fill="#1E40AF" stroke="#1E3A8A" stroke-width="1.5"/>
<text x="600" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">User Prompt</text>
<text x="600" y="115" text-anchor="middle" font-size="10.5" fill="#FFFFFF">"Calculate binding free energy of ritonavir to HIV-1 PR"</text>

<!-- Arrow down -->
<line x1="600" y1="125" x2="600" y2="150" stroke="#9CA3AF" stroke-width="1.8" marker-end="url(#arr)"/>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- AI AGENT CORE                                                      -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<rect x="395" y="153" width="410" height="60" rx="12" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/>
<text x="600" y="179" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E40AF">AI Agent Core  (Claude Code)</text>
<text x="600" y="200" text-anchor="middle" font-size="11" fill="#334155">Reasons, plans protocol, executes tools, diagnoses errors</text>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- FAN-OUT BUS                                                        -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<line x1="600" y1="213" x2="600" y2="242" stroke="#9CA3AF" stroke-width="1.8"/>
<!-- Horizontal bus -->
<line x1="145" y1="242" x2="980" y2="242" stroke="#9CA3AF" stroke-width="1.8"/>

<!-- Drops -->
<line x1="145"  y1="242" x2="145"  y2="270" stroke="#EA580C" stroke-width="1.8" marker-end="url(#arr-orange)"/>
<line x1="370"  y1="242" x2="370"  y2="270" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arr-purple)"/>
<line x1="600"  y1="242" x2="600"  y2="270" stroke="#D97706" stroke-width="1.8" marker-end="url(#arr-amber)"/>
<line x1="790"  y1="242" x2="790"  y2="270" stroke="#16A34A" stroke-width="1.8" marker-end="url(#arr-green)"/>
<line x1="980"  y1="242" x2="980"  y2="270" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arr-blue)"/>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- 5 RESOURCE BOXES  (y=273, h=120)                                   -->
<!-- ═══════════════════════════════════════════════════════════════════ -->

<!-- 1. Amber Manual RAG -->
<rect x="65" y="273" width="160" height="120" rx="8" fill="#FFEDD5" stroke="#EA580C" stroke-width="2.5"/>
<text x="145" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2410C">Amber Manual</text>
<line x1="75" y1="302" x2="215" y2="302" stroke="#FDBA74" stroke-width="0.8"/>
<text x="145" y="320" text-anchor="middle" font-size="10" fill="#1C1917">RAG search over</text>
<text x="145" y="336" text-anchor="middle" font-size="10" fill="#1C1917">full manual PDF</text>
<text x="145" y="352" text-anchor="middle" font-size="10" fill="#1C1917">Returns full pages</text>
<text x="145" y="380" text-anchor="middle" font-size="9" font-weight="bold" fill="#EA580C">Queried FIRST, always</text>

<!-- 2. MCP Database Servers -->
<rect x="245" y="273" width="250" height="120" rx="8" fill="#E9D5FF" stroke="#7C3AED" stroke-width="2.5"/>
<text x="370" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D28D9">6 MCP Database Servers</text>
<line x1="255" y1="302" x2="485" y2="302" stroke="#C4B5FD" stroke-width="0.8"/>
<text x="270" y="320" font-size="10" font-weight="bold" fill="#2563EB">PDB</text>
<text x="300" y="320" font-size="9" fill="#1C1917">structures</text>
<text x="270" y="338" font-size="10" font-weight="bold" fill="#7C3AED">UniProt</text>
<text x="318" y="338" font-size="9" fill="#1C1917">biology</text>
<text x="270" y="356" font-size="10" font-weight="bold" fill="#16A34A">PubChem</text>
<text x="328" y="356" font-size="9" fill="#1C1917">3D conf.</text>
<text x="390" y="320" font-size="10" font-weight="bold" fill="#EA580C">ChEMBL</text>
<text x="438" y="320" font-size="9" fill="#1C1917">Ki / IC50</text>
<text x="390" y="338" font-size="10" font-weight="bold" fill="#D97706">AlphaFold</text>
<text x="450" y="338" font-size="9" fill="#1C1917">pred.</text>
<text x="390" y="356" font-size="10" font-weight="bold" fill="#2563EB">STRING</text>
<text x="434" y="356" font-size="9" fill="#1C1917">PPI nets</text>
<text x="370" y="380" text-anchor="middle" font-size="9" font-weight="bold" fill="#7C3AED">Live REST APIs, auto-queried</text>

<!-- 3. Toolkit -->
<rect x="515" y="273" width="170" height="120" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="2.5"/>
<text x="600" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#B45309">Toolkit</text>
<line x1="525" y1="302" x2="675" y2="302" stroke="#FCD34D" stroke-width="0.8"/>
<text x="600" y="320" text-anchor="middle" font-size="10" fill="#1C1917">write-mdin</text>
<text x="600" y="336" text-anchor="middle" font-size="10" fill="#1C1917">write-tleap</text>
<text x="600" y="352" text-anchor="middle" font-size="10" fill="#1C1917">run-amber, run-cpptraj</text>
<text x="600" y="380" text-anchor="middle" font-size="9" font-weight="bold" fill="#D97706">md_agent.py — 20+ functions</text>

<!-- 4. System Prep -->
<rect x="705" y="273" width="170" height="120" rx="8" fill="#BBF7D0" stroke="#16A34A" stroke-width="2.5"/>
<text x="790" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803D">System Prep</text>
<line x1="715" y1="302" x2="865" y2="302" stroke="#86EFAC" stroke-width="0.8"/>
<text x="790" y="320" text-anchor="middle" font-size="10" fill="#1C1917">antechamber + GAFF2</text>
<text x="790" y="336" text-anchor="middle" font-size="10" fill="#1C1917">parmchk2 + frcmod</text>
<text x="790" y="352" text-anchor="middle" font-size="10" fill="#1C1917">tLEaP  &#x2192;  prmtop/inpcrd</text>
<text x="790" y="380" text-anchor="middle" font-size="9" font-weight="bold" fill="#16A34A">ff14SB + TIP3P + solvate</text>

<!-- 5. SLURM Cluster -->
<rect x="895" y="273" width="170" height="120" rx="8" fill="#BFDBFE" stroke="#2563EB" stroke-width="2.5"/>
<text x="980" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#1D4ED8">SLURM Cluster</text>
<line x1="905" y1="302" x2="1055" y2="302" stroke="#93C5FD" stroke-width="0.8"/>
<text x="980" y="320" text-anchor="middle" font-size="10" fill="#1C1917">pmemd.cuda (GPU)</text>
<text x="980" y="336" text-anchor="middle" font-size="10" fill="#1C1917">sbatch + squeue</text>
<text x="980" y="352" text-anchor="middle" font-size="10" fill="#1C1917">mdinfo ETA check</text>
<text x="980" y="380" text-anchor="middle" font-size="9" font-weight="bold" fill="#2563EB">Auto-polled, failure detect</text>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- FAN-IN BUS                                                         -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<line x1="145" y1="393" x2="145" y2="425" stroke="#9CA3AF" stroke-width="1.5"/>
<line x1="370" y1="393" x2="370" y2="425" stroke="#9CA3AF" stroke-width="1.5"/>
<line x1="600" y1="393" x2="600" y2="425" stroke="#9CA3AF" stroke-width="1.5"/>
<line x1="790" y1="393" x2="790" y2="425" stroke="#9CA3AF" stroke-width="1.5"/>
<line x1="980" y1="393" x2="980" y2="425" stroke="#9CA3AF" stroke-width="1.5"/>
<line x1="145" y1="425" x2="980" y2="425" stroke="#9CA3AF" stroke-width="1.5"/>
<line x1="600"  y1="425" x2="600"  y2="452" stroke="#9CA3AF" stroke-width="1.8" marker-end="url(#arr)"/>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- PROTOCOL PLAN                                                      -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<rect x="415" y="455" width="370" height="50" rx="8" fill="#E2E8F0" stroke="#64748B" stroke-width="2"/>
<text x="600" y="476" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Protocol Plan</text>
<text x="600" y="495" text-anchor="middle" font-size="10" fill="#334155">Manual-sourced params  &#x2192;  confirmed with user  &#x2192;  input files</text>

<line x1="600" y1="505" x2="600" y2="530" stroke="#9CA3AF" stroke-width="1.8" marker-end="url(#arr)"/>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- MD SIMULATION PIPELINE                                             -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<rect x="340" y="533" width="520" height="115" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="2.5"/>
<text x="600" y="555" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">MD Simulation Pipeline  &#x2192;  SLURM GPU</text>
<line x1="355" y1="563" x2="845" y2="563" stroke="#FCD34D" stroke-width="0.8"/>

<!-- Pipeline pills -->
<rect x="365" y="575" width="95" height="32" rx="8" fill="#BFDBFE" stroke="#2563EB" stroke-width="2"/>
<text x="412" y="596" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4ED8">Minimize</text>

<line x1="460" y1="591" x2="485" y2="591" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="488" y="575" width="75" height="32" rx="8" fill="#BBF7D0" stroke="#16A34A" stroke-width="2"/>
<text x="525" y="596" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803D">Heat</text>

<line x1="563" y1="591" x2="588" y2="591" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="591" y="575" width="75" height="32" rx="8" fill="#FDE68A" stroke="#D97706" stroke-width="2"/>
<text x="628" y="596" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">Equil</text>

<line x1="666" y1="591" x2="691" y2="591" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="694" y="575" width="75" height="32" rx="8" fill="#E9D5FF" stroke="#7C3AED" stroke-width="2"/>
<text x="731" y="596" text-anchor="middle" font-size="11" font-weight="bold" fill="#6D28D9">Prod</text>

<!-- Advanced sampling -->
<text x="600" y="630" text-anchor="middle" font-size="10" fill="#374151">+ Umbrella Sampling  &#x00B7;  TI  &#x00B7;  REMD  &#x00B7;  SMD  &#x00B7;  MM-PBSA  &#x00B7;  GaMD  &#x00B7;  QM/MM</text>

<line x1="600" y1="648" x2="600" y2="673" stroke="#9CA3AF" stroke-width="1.8" marker-end="url(#arr)"/>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- ANALYSIS + VALIDATION                                              -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<rect x="415" y="676" width="370" height="52" rx="8" fill="#BAE6FD" stroke="#0284C7" stroke-width="2.5"/>
<text x="600" y="698" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C4A6E">Analysis + Validation</text>
<text x="600" y="718" text-anchor="middle" font-size="10" fill="#334155">cpptraj trajectory analysis  &#x00B7;  free energy  &#x00B7;  experimental validation</text>

<line x1="600" y1="728" x2="600" y2="753" stroke="#9CA3AF" stroke-width="1.8" marker-end="url(#arr)"/>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- FINAL REPORT                                                       -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<rect x="415" y="756" width="370" height="52" rx="8" fill="#15803D" stroke="#166534" stroke-width="1.5"/>
<text x="600" y="778" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Final Report</text>
<text x="600" y="798" text-anchor="middle" font-size="10.5" fill="#FFFFFF">Publication-ready results  &#x00B7;  plots  &#x00B7;  trajectory  &#x00B7;  free energy</text>

